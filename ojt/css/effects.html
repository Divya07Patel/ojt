<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Effects</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 200px;
      height: 200px;
      background: #3498db;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      border-radius: 12px;

      /* smooth transition effect */
      transition: all 0.4s ease;

      /* shadow effect */
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* 🔥 Hover Effect */
    .box:hover {
      background: #e74c3c;
      transform: scale(1.2) rotate(5deg);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    /* 🌟 Floating animation effect */
    @keyframes float {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }

    .float-box {
      margin-top: 40px;
      width: 200px;
      height: 200px;
      background: #2ecc71;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 12px;

      animation: float 2s infinite ease-in-out;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    /* ✨ Button glow effect */
    .btn {
      margin-top: 40px;
      padding: 12px 25px;
      border: none;
      background: #8e44ad;
      color: white;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      box-shadow: 0 0 20px #8e44ad;
      transform: scale(1.1);
    }

  </style>
</head>

<body>

  <div style="display: flex; flex-direction: column; align-items: center;">
    
    <div class="box">
      Hover Me
    </div>

    <div class="float-box">
      Floating Box
    </div>

    <button class="btn">Glow Button</button>

  </div>

</body>
</html>
