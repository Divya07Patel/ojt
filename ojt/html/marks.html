<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marksheet Sample</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .container {
            border: 1px solid #000;
            padding: 10px;
            width: 100%;
            max-width: 1200px;
            box-sizing: border-box;
        }
        .header-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .university-title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            text-align: center;
        }
        th, td {
            border: 1px solid #000;
            padding: 8px 4px;
            height: 20px;
        }
        th {
            font-weight: bold;
            background-color: #f9f9f9;
        }
        .left-align {
            text-align: left;
        }
        .bold-text {
            font-weight: bold;
        }
        .footer-text {
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="header-title">MARKSHEET SAMPLE</div>

<div class="container">
    <div class="university-title">Silver Oak University</div>
    
    <table>
        <thead>
            <tr>
                <th rowspan="2">Enroll no<br>no.</th>
                <th rowspan="2">Course name</th>
                <th rowspan="2">Course code</th>
                <th rowspan="2">CIE(theory)</th>
                <th rowspan="2">CIE(percentage)</th>
                <th>Seat no</th>
                <th rowspan="2">ESE(percentage)</th>
                <th rowspan="2">Total marks</th>
                <th rowspan="2">Obtained marks</th>
            </tr>
            <tr>
                <th>ESE(theory)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="bold-text">01</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td class="bold-text">02</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td class="bold-text">03</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td class="bold-text">04</td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
                <td></td>
            </tr>
            <tr>
                <td colspan="9" class="bold-text">TOTAL MARMS</td>
            </tr>
            <tr>
                <td class="bold-text left-align">Percentage</td>
                <td colspan="4"></td>
                <td class="bold-text">CGPA</td>
                <td colspan="3"></td>
            </tr>
        </tbody>
    </table>
    
    <div class="footer-text">All The Best</div>
</div>

</body>
</html>
