<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>

    <h2>Registration Form</h2>

    <form>
        <label>First Name:</label><br>
        <input type="text" name="firstname" required placeholder="Enter your First Name"><br><br>

        <label>Last Name:</label><br>
        <input type="text" name="lastname" required placeholder="Enter your Last Name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required placeholder="Enter your Email"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required placeholder="Enter your password"><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female<br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone" required placeholder="Enter your Phone Number"><br><br>

        <input type="submit" value="Register">
    </form>

</body>
</html>
