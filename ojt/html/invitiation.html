<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Invitation</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .card {
        background: white;
        width: 90%;
        max-width: 600px;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h1 {
        color: #ff4d6d;
    }

    p {
        font-size: 16px;
        color: #444;
    }

    .section {
        margin-top: 20px;
    }

    iframe {
        width: 100%;
        border-radius: 12px;
    }

    audio, video {
        width: 100%;
        margin-top: 10px;
    }

    .btn {
        display: inline-block;
        margin-top: 15px;
        padding: 10px 15px;
        background: #ff4d6d;
        color: white;
        text-decoration: none;
        border-radius: 10px;
    }

    .highlight {
        font-weight: bold;
        color: #ff4d6d;
        font-size: 18px;
    }
</style>

</head>

<body>

<div class="card">

    <h1>🎉 You're Invited! 🎉</h1>

    <p class="highlight">Patel Divya</p>
    <p><b>Birthday Date:</b> 17th July</p>

    <p><b>It's My Birthday Party!</b></p>
    <p>Join me for fun, cake, music & memories 🥳</p>

    <div class="section">
        <h3>🎤 Voice Invitation</h3>
        <audio controls>
            <source src="voice-note.mp3" type="audio/mpeg">
        </audio>
    </div>
  <div class="section">
    <h3>🎥 Special Video Invite</h3>

    <video controls autoplay muted loop>
        <source src="https://cdn.pixabay.com/video/2025/06/11/285203_tiny.mp4" type="video/mp4">
    </video>

    <p style="font-size:12px;color:gray;">
    </p>
</div>

    <div class="section">
        <h3>📍 Party Location</h3>

        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14686.123456789!2d72.5714!3d23.0225!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2sAhmedabad!5e0!3m2!1sen!2sin!4v0000000000000"
            height="300"
            style="border:0;"
            allowfullscreen=""
            loading="lazy">
        </iframe>
    </div>

</div>

</body>
</html>
