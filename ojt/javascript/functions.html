<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Functions</title>
</head>

<body>
    <h2>Math Constants</h2>
    <p id="demo"></p>
    <script>
        document.getElementById("demo").innerHTML =
            "<p><b>Math.E:</b> " + Math.E + "</p>" +
            "<p><b>Math.PI:</b> " + Math.PI + "</p>" +
            "<p><b>Math.SQRT2:</b> " + Math.SQRT2 + "</p>" +
            "<p><b>Math.SQRT1_2:</b> " + Math.SQRT1_2 + "</p>" +
            "<p><b>Math.LN2:</b> " + Math.LN2 + "</p>" +
            "<p><b>Math.LN10:</b> " + Math.LN10 + "</p>" +
            "<p><b>Math.LOG2E:</b> " + Math.LOG2E + "</p>" +
            "<p><b>Math.Log10E:</b> " + Math.LOG10E + "</p>" +
            "<p><b>Math.abs(-7.25):</b> " + Math.abs(-7.25) + "</p>" +
            "<p><b>Math.ceil(7.25):</b> " + Math.ceil(7.25) + "</p>" +
            "<p><b>Math.floor(7.25):</b> " + Math.floor(7.25) + "</p>" +
            "<p><b>Math.round(7.25):</b> " + Math.round(7.25) + "</p>" +
            "<p><b>Math.max(5, 10, 15):</b> " + Math.max(5, 10, 15) + "</p>" +
            "<p><b>Math.min(5, 10, 15):</b> " + Math.min(5, 10, 15) + "</p>" +
            "<p><b>Math.pow(2, 3):</b> " + Math.pow(2, 3) + "</p>" +
            "<p><b>Math.sqrt(16):</b> " + Math.sqrt(16) + "</p>" +
            "<p><b>Math.sin(30):</b> " + Math.sin(30 * Math.PI / 180) + "</p>" +
            "<p><b>Math.cos(30):</b> " + Math.cos(30 * Math.PI / 180) + "</p>" ;
    </script>
</body>

</html>
