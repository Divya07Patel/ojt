<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>
</head>
<body>
    <h1 align="center">JavaScript Introduction</h1>
    <p id="Demo"></p>
    <p id="demo2"></p>
    <button id="alert">Alert Box</button>
    <br><br>
    <button id="confirm">Confirm Box</button>
    <br><br>
    <button id="prompt">Prompt Box</button>
    </p>
    <script>
        document.getElementById("alert").addEventListener("click", function() {
            alert("Welcome to JavaScript!");
        });
        document.getElementById("confirm").addEventListener("click", function() {
            confirm("Do you want to continue?");
        });
        document.getElementById("prompt").addEventListener("click", function() {
            var name = prompt("Please enter your name:");
            if (name) {
                document.getElementById("demo2").innerHTML = "Hello, " + name + "!";
            } else {
                document.getElementById("demo2").innerHTML = "No name entered.";
            }
        });
        var x=5;
        var y=6;
        var z=x+y;
        document.write("The value of x is: " + x + "<br>");
        document.write("The value of y is: " + y + "<br>"); 
        document.write("The sum of x and y is: " + z + "<br>");
    </script>
</body>
</html>
